services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vacancy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vacancy}
      POSTGRES_DB: ${POSTGRES_DB:-vacancy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-vacancy}
      DB_USERNAME: ${POSTGRES_USER:-vacancy}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vacancy}
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]

volumes:
  postgres_data:
